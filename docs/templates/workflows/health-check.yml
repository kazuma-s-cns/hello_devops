name: ヘルスチェック

on:
  # TODO-1
  # TODO-2

env:
  SITE_URL: # TODO-3

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: ヘルスチェックを実行
        id: health_check
        run: |
          echo "Checking: $SITE_URL"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$SITE_URL")
          echo "HTTP Status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed with status: $STATUS"
            # TODO-4: 異常時
          else
            echo "Health check passed!"
            # TODO-4: 正常時
          fi

      - name: ヘルスチェック失敗時にワークフローを失敗させる
        if: ${{ steps.health_check.outputs.HEALTH_STATUS == 'failed' }}
        run: exit 1
